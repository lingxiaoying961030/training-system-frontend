<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 F 改进 — 木质顶栏 + 纹理底</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #F5EFE0; color: #3E2723; }

.demo-nav { position: sticky; top: 0; z-index: 100; padding: 10px 20px; background: #5B3A29; color: #E8A93A; font-size: 14px; font-weight: bold; }
.container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
.section-desc { font-size: 13px; color: #8B7355; margin-bottom: 16px; line-height: 1.7; }

.cards-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

.card {
  border: 3px solid #E0D5C8; background: #FFFDF5; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.card:hover { transform: translateY(-3px); box-shadow: 4px 6px 0 #5B3A29; border-color: #5B3A29; }

/* 木质标题条 — 顶部 */
.card-label {
  position: relative; height: 36px; overflow: hidden;
}
.card-label img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill;
}
.card-label .label-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: "ZCOOL QingKe HuangYou", sans-serif;
  font-size: 14px; letter-spacing: 2px;
  color: #FFF8E7; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* 封面 — 渐变 + 纹理 */
.card-cover {
  height: 120px; position: relative;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 3px solid #E0D5C8;
}
/* 纹理叠层 */
.card-cover::before {
  content: ''; position: absolute; inset: 0;
  background: url('/pixel-icons/ui/floor_02.png') repeat;
  background-size: 24px;
  opacity: 0.06;
}
/* 角落装饰 */
.card-cover .corner-deco {
  position: absolute; bottom: 8px; right: 8px; opacity: 0.3;
  image-rendering: pixelated;
}

.card-cover .icon {
  width: 48px; height: 48px; image-rendering: pixelated;
  filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.15));
  position: relative; z-index: 1;
  transition: transform 0.3s;
}
.card:hover .icon { transform: translateY(-4px); }

/* 配色 */
.bg-sage { background: linear-gradient(135deg, #D4E7C5, #C5DEBA); }
.bg-sky { background: linear-gradient(135deg, #C5D8E7, #B0CAD9); }
.bg-warm { background: linear-gradient(135deg, #E7DFC8, #DDD4BC); }
.bg-lavender { background: linear-gradient(135deg, #E0D0E7, #D1BFD9); }
.bg-peach { background: linear-gradient(135deg, #E7D4C5, #D9C4B0); }
.bg-mint { background: linear-gradient(135deg, #C5E7DE, #B0D9CE); }

.card-body { padding: 12px 16px; }
.card-body p { font-size: 12px; color: #8B7355; }

.mini-progress { height: 10px; background: #E0D5C8; border: 2px solid #5B3A29; margin-top: 8px; }
.mini-fill { height: 100%; background: #5C8A4D; }
.mini-fill.gold { background: #E8A93A; }
</style>
</head>
<body>

<div class="demo-nav">🎨 方案 F 改进 — 木质顶栏 + 纹理背景 + 角落装饰</div>

<div class="container">
  <div class="section-desc">木质条移到顶部做标题栏，封面用渐变+地板纹理(6%透明)，角落一个低透明度小装饰。</div>

  <div class="cards-row">
    <div class="card">
      <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">图像标注基础</div></div>
      <div class="card-cover bg-sage">
        <img src="/pixel-icons/projects/adventure_icon_64px.png" class="icon">
        <img src="/pixel-icons/decorations/deco_tree1.png" class="corner-deco" style="height:36px;">
      </div>
      <div class="card-body">
        <p>已完成 3/8 关卡</p>
        <div class="mini-progress"><div class="mini-fill" style="width:37%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">NLP 文本分类</div></div>
      <div class="card-cover bg-sky">
        <img src="/pixel-icons/projects/gem_icon_64px.png" class="icon">
        <img src="/pixel-icons/decorations/deco_junimo.png" class="corner-deco" style="height:24px;">
      </div>
      <div class="card-body">
        <p>已完成 6/8 关卡</p>
        <div class="mini-progress"><div class="mini-fill" style="width:75%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">语音标注进阶</div></div>
      <div class="card-cover bg-lavender">
        <img src="/pixel-icons/projects/chestRuby_icon_64px.png" class="icon">
        <img src="/pixel-icons/decorations/deco_chicken.png" class="corner-deco" style="height:24px;">
      </div>
      <div class="card-body">
        <p>尚未开始</p>
        <div class="mini-progress"><div class="mini-fill gold" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div style="margin-top:32px;">
    <div class="section-desc">更多配色（6个项目效果预览）：</div>
    <div class="cards-row">
      <div class="card">
        <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">数据清洗入门</div></div>
        <div class="card-cover bg-warm">
          <img src="/pixel-icons/projects/key_icon_64px.png" class="icon">
          <img src="/pixel-icons/decorations/deco_cat.png" class="corner-deco" style="height:28px;">
        </div>
        <div class="card-body"><p>已完成 2/5 关卡</p><div class="mini-progress"><div class="mini-fill" style="width:40%"></div></div></div>
      </div>
      <div class="card">
        <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">目标检测实战</div></div>
        <div class="card-cover bg-peach">
          <img src="/pixel-icons/projects/energy_icon_64px.png" class="icon">
          <img src="/pixel-icons/decorations/deco_duck.png" class="corner-deco" style="height:22px;">
        </div>
        <div class="card-body"><p>已完成 7/8 关卡</p><div class="mini-progress"><div class="mini-fill" style="width:87%"></div></div></div>
      </div>
      <div class="card">
        <div class="card-label"><img src="/pixel-icons/dobo/wood_label.png"><div class="label-text">多模态标注</div></div>
        <div class="card-cover bg-mint">
          <img src="/pixel-icons/projects/adventure_icon_64px.png" class="icon">
          <img src="/pixel-icons/decorations/deco_dog.png" class="corner-deco" style="height:26px;">
        </div>
        <div class="card-body"><p>尚未开始</p></div>
      </div>
    </div>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录页 + 欢迎动画 Demo v2</title>
<style>
:root {
  --pixel-green: #5C8A4D;
  --pixel-gold: #E8A93A;
  --pixel-bg: #FFF8E7;
  --pixel-card: #FFFDF5;
  --pixel-brown: #5B3A29;
  --pixel-red: #C24A3A;
  --pixel-blue: #4A90B8;
  --pixel-border: #E0D5C8;
  --pixel-text: #3E2723;
  --pixel-text-secondary: #8B7355;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

/* Demo Nav */
.demo-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: rgba(62,39,35,0.92); padding: 8px 16px;
  display: flex; gap: 8px; align-items: center;
}
.demo-nav span { color: #E8A93A; font-size: 12px; }
.dbtn { padding: 4px 14px; font-size: 12px; border: 2px solid #8B6F5E; background: #5B3A29; color: #E8A93A; cursor: pointer; }
.dbtn:hover { background: #8B6F5E; }
.dbtn.active { background: #E8A93A; color: #3E2723; border-color: #E8A93A; }

/* ===== 5A: Login Page ===== */
#page-login {
  position: fixed; inset: 0; top: 40px;
  display: flex; align-items: center; justify-content: center;
  /* daybg 铺满 */
  background: url('frontend/public/pixel-icons/ui/daybg.png') center / cover no-repeat;
  image-rendering: pixelated;
  overflow: hidden;
}
/* 柔化叠加层 */
#page-login::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,248,231,0.15) 0%, rgba(0,0,0,0.1) 100%);
}

/* 装饰 */
.login-deco { position: absolute; image-rendering: pixelated; pointer-events: none; z-index: 2; }
.deco-tree-l { left: 4%; bottom: 5%; width: 110px; opacity: 0.85; }
.deco-tree-r { right: 5%; bottom: 8%; width: 95px; opacity: 0.75; transform: scaleX(-1); }
.deco-a1 { left: 15%; bottom: 3%; width: 44px; animation: bob 3s ease-in-out infinite; }
.deco-a2 { right: 16%; bottom: 4%; width: 38px; animation: bob 3.5s ease-in-out infinite 0.5s; }
.deco-a3 { left: 50%; bottom: 2%; width: 32px; animation: bob 2.8s ease-in-out infinite 1s; transform: translateX(-50%); }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

/* 登录面板 */
.login-panel {
  position: relative; z-index: 10;
  width: 380px; max-width: 90vw;
  /* 羊皮纸底 */
  background: url('frontend/public/pixel-icons/ui/letterBG.png') center / cover no-repeat;
  image-rendering: auto;
  border: 5px solid var(--pixel-brown);
  box-shadow: 6px 6px 0 rgba(91,58,41,0.35), inset 0 0 40px rgba(200,170,120,0.2);
  padding: 32px 30px 24px;
  animation: panelIn 0.6s ease;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(24px) scale(0.94); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
/* 木牌顶条 */
.login-panel::before {
  content: ''; position: absolute; top: -8px; left: -5px; right: -5px; height: 10px;
  background: linear-gradient(180deg, #C8956C 0%, #A0724A 40%, #8B6340 100%);
  border: 2px solid var(--pixel-brown); border-bottom: none;
}
.login-panel::after {
  content: '🍃'; position: absolute; top: -14px; right: 12px; font-size: 16px;
  transform: rotate(-20deg);
}

.login-logo { text-align: center; margin-bottom: 22px; }
.login-logo-icon { font-size: 40px; margin-bottom: 4px; }
.login-logo h1 { font-size: 20px; color: var(--pixel-brown); margin: 0; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); }
.login-logo p { font-size: 12px; color: var(--pixel-text-secondary); margin-top: 4px; }

.login-form { display: flex; flex-direction: column; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 3px; }
.form-group label { font-size: 12px; color: var(--pixel-text-secondary); font-weight: 500; }
.form-input {
  padding: 10px 12px; font-size: 14px;
  border: 3px solid var(--pixel-border); background: rgba(255,253,245,0.85);
  color: var(--pixel-text); outline: none;
}
.form-input:focus { border-color: var(--pixel-gold); background: rgba(255,253,245,0.95); }
.form-input::placeholder { color: #C5B89A; }

.login-btn {
  padding: 11px; font-size: 15px; font-weight: 600;
  border: 3px solid var(--pixel-brown); cursor: pointer;
  color: #fff; background: var(--pixel-green);
  text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  transition: all 0.15s;
}
.login-btn:hover { background: #4A7A3D; box-shadow: 3px 3px 0 var(--pixel-brown); }

.login-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 2px 0; color: var(--pixel-text-secondary); font-size: 12px;
}
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #D5C0A5; }

.feishu-btn {
  padding: 10px; font-size: 14px;
  border: 3px solid var(--pixel-border); cursor: pointer;
  color: var(--pixel-brown); background: rgba(255,253,245,0.7);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.feishu-btn:hover { border-color: var(--pixel-blue); background: rgba(240,250,255,0.8); box-shadow: 2px 2px 0 rgba(91,58,41,0.1); }

.login-footer { text-align: center; margin-top: 14px; font-size: 11px; color: var(--pixel-text-secondary); opacity: 0.8; }

/* ===== 5B: Welcome ===== */
#page-welcome {
  position: fixed; inset: 0; top: 40px;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  /* nightbg 铺满 */
  background: url('frontend/public/pixel-icons/ui/nightbg.png') center / cover no-repeat;
  image-rendering: pixelated;
  overflow: hidden;
}
/* 额外星星点缀 */
.star { position: absolute; width: 2px; height: 2px; background: #FFE8A0; animation: twinkle 2s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* 对话框 — 用羊皮纸底 */
.dialog-box {
  position: relative; z-index: 10;
  width: 580px; max-width: 90vw;
  background: url('frontend/public/pixel-icons/ui/letterBG.png') center / cover no-repeat;
  border: 5px solid var(--pixel-brown);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
  padding: 24px 28px;
  opacity: 0; transform: translateY(20px);
  transition: all 0.6s ease;
}
.dialog-box.visible { opacity: 1; transform: translateY(0); }

.dialog-speaker {
  font-size: 14px; font-weight: 600; color: var(--pixel-brown);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.dialog-speaker img { width: 28px; height: 28px; image-rendering: pixelated; }

.dialog-text {
  font-size: 16px; line-height: 1.8; color: var(--pixel-text);
  min-height: 72px;
}
.cursor { display: inline-block; width: 2px; height: 18px; background: var(--pixel-brown); margin-left: 2px; animation: blink 0.6s step-end infinite; vertical-align: text-bottom; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.dialog-hint { text-align: right; margin-top: 10px; font-size: 12px; color: var(--pixel-text-secondary); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* 角色选择 */
.avatar-select {
  position: relative; z-index: 10;
  width: 580px; max-width: 90vw; margin-top: 16px;
  background: url('frontend/public/pixel-icons/ui/letterBG.png') center / cover no-repeat;
  border: 5px solid var(--pixel-brown);
  box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
  padding: 20px 24px;
  opacity: 0; transform: translateY(20px);
  transition: all 0.6s ease;
}
.avatar-select.visible { opacity: 1; transform: translateY(0); }
.avatar-select h3 { font-size: 15px; color: var(--pixel-brown); margin: 0 0 12px; text-align: center; }

.avatar-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
  max-height: 190px; overflow-y: auto;
}
.avatar-grid::-webkit-scrollbar { width: 6px; }
.avatar-grid::-webkit-scrollbar-thumb { background: var(--pixel-border); }

.avo {
  aspect-ratio: 1; border: 3px solid var(--pixel-border);
  cursor: pointer; background: rgba(255,253,245,0.6);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.avo:hover { border-color: var(--pixel-gold); transform: scale(1.08); background: rgba(255,253,245,0.9); }
.avo.selected { border-color: var(--pixel-green); background: #ECF5E8; box-shadow: 0 0 0 2px var(--pixel-green); }
.avo img { width: 80%; height: 80%; image-rendering: pixelated; object-fit: contain; }

.confirm-row { margin-top: 14px; text-align: center; }
.cbtn {
  padding: 10px 40px; font-size: 14px; font-weight: 600;
  border: 3px solid var(--pixel-brown); cursor: pointer;
  color: #fff; background: var(--pixel-green);
  opacity: 0.35; pointer-events: none; transition: all 0.15s;
}
.cbtn.ok { opacity: 1; pointer-events: auto; }
.cbtn.ok:hover { background: #4A7A3D; box-shadow: 3px 3px 0 var(--pixel-brown); }

/* 过渡 */
.trans {
  position: fixed; inset: 0; z-index: 100;
  background: var(--pixel-bg);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.trans.active { display: flex; animation: fadeIO 2.2s ease forwards; }
@keyframes fadeIO { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
.trans img { width: 64px; height: 64px; image-rendering: pixelated; animation: walk 0.4s steps(2) infinite; }
@keyframes walk { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.trans p { font-size: 16px; color: var(--pixel-brown); font-weight: 500; }
</style>
</head>
<body>

<div class="demo-nav">
  <span>🎮 Step 5 Demo v2:</span>
  <button class="dbtn active" onclick="showPage('login')">5A 登录页</button>
  <button class="dbtn" onclick="showPage('welcome')">5B 欢迎动画</button>
  <button class="dbtn" onclick="playFull()">完整流程</button>
</div>

<!-- ===== 5A: Login ===== -->
<div id="page-login">
  <img class="login-deco deco-tree-l" src="frontend/public/pixel-icons/decorations/tree_01.png" />
  <img class="login-deco deco-tree-r" src="frontend/public/pixel-icons/decorations/tree_02.png" />
  <img class="login-deco deco-a1" src="frontend/public/pixel-icons/decorations/chicken_white.png" />
  <img class="login-deco deco-a2" src="frontend/public/pixel-icons/decorations/cat.png" />
  <img class="login-deco deco-a3" src="frontend/public/pixel-icons/decorations/junimo.png" />

  <div class="login-panel">
    <div class="login-logo">
      <div class="login-logo-icon">🏰</div>
      <h1>培训营地</h1>
      <p>开启你的学习冒险之旅</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>📱 手机号</label>
        <input class="form-input" type="tel" placeholder="请输入手机号" />
      </div>
      <div class="form-group">
        <label>🔑 验证码</label>
        <div style="display:flex; gap:8px;">
          <input class="form-input" style="flex:1;" type="text" placeholder="请输入验证码" />
          <button class="login-btn" style="font-size:12px; padding:8px 12px; white-space:nowrap;">发送验证码</button>
        </div>
      </div>
      <button class="login-btn" onclick="showPage('welcome')">⚔️ 开始冒险</button>
      <div class="login-divider">或</div>
      <button class="feishu-btn" onclick="showPage('welcome')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6.5L10.5 2L21 13.5L13.5 22L3 6.5Z" fill="#4A90B8"/><path d="M3 6.5L13.5 22L10.5 14.5L3 6.5Z" fill="#2D6A9F"/></svg>
        飞书登录
      </button>
    </div>
    <div class="login-footer">内部培训系统 · 仅限授权人员使用</div>
  </div>
</div>

<!-- ===== 5B: Welcome ===== -->
<div id="page-welcome">
  <div id="starfield"></div>

  <div class="dialog-box" id="dialogBox">
    <div class="dialog-speaker">
      <img src="frontend/public/pixel-icons/decorations/junimo.png" /> Junimo 精灵
    </div>
    <div class="dialog-text" id="dialogText"><span class="cursor"></span></div>
    <div class="dialog-hint" id="dialogHint" style="display:none;">点击任意位置继续 ▶</div>
  </div>

  <div class="avatar-select" id="avatarSelect">
    <h3>✨ 选择你的冒险伙伴</h3>
    <div class="avatar-grid" id="avatarGrid"></div>
    <div class="confirm-row">
      <button class="cbtn" id="confirmBtn" onclick="confirmAvatar()">🚀 出发冒险！</button>
    </div>
  </div>
</div>

<!-- 过渡 -->
<div class="trans" id="transOverlay">
  <img id="transAvatar" src="" />
  <p>冒险开始...</p>
</div>

<script>
const avatars = ['abigail','alex','caroline','clint','demetrius','elliott','emily',
  'gunther','gus','haley','harvey','jas','jodi','junimo','kent','krobus','leah',
  'lewis','linus','marnie','maru','pam','penny','pierre','robin','robot','sam',
  'sandy','sebastian','shane','vincent','willy','wizard'];

const lines = [
  '欢迎来到培训营地！🏕️',
  '在这里，每个项目都是一段冒险旅程...',
  '你将闯过一个个关卡，学习新技能，接受挑战！⚔️',
  '不过在出发之前——你得先选一个冒险伙伴。',
];

let curLine = 0, charIdx = 0, typing = false, selAvatar = null, phase = 'dialog';

function createStars() {
  const el = document.getElementById('starfield');
  el.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s;opacity:${Math.random()*0.4+0.2}`;
    el.appendChild(s);
  }
}

function typeText(text, el, cb) {
  typing = true; charIdx = 0; el.innerHTML = '';
  function tick() {
    if (!typing) return;
    if (charIdx < text.length) {
      el.innerHTML = text.substring(0, ++charIdx) + '<span class="cursor"></span>';
      setTimeout(tick, 35 + Math.random() * 25);
    } else { typing = false; if (cb) cb(); }
  }
  tick();
}

function advanceDialog() {
  if (typing) {
    typing = false;
    document.getElementById('dialogText').innerHTML = lines[curLine] + '<span class="cursor"></span>';
    document.getElementById('dialogHint').style.display = 'block';
    return;
  }
  curLine++;
  if (curLine < lines.length) {
    document.getElementById('dialogHint').style.display = 'none';
    typeText(lines[curLine], document.getElementById('dialogText'), () => {
      document.getElementById('dialogHint').style.display = 'block';
    });
  } else {
    phase = 'avatar';
    document.getElementById('dialogBox').style.display = 'none';
    document.getElementById('avatarSelect').classList.add('visible');
  }
}

function initWelcome() {
  createStars();
  const grid = document.getElementById('avatarGrid');
  grid.innerHTML = '';
  avatars.forEach(a => {
    const d = document.createElement('div');
    d.className = 'avo';
    d.innerHTML = `<img src="frontend/public/pixel-icons/avatars/avatar_${a}_head.png" />`;
    d.onclick = () => { document.querySelectorAll('.avo').forEach(e=>e.classList.remove('selected')); d.classList.add('selected'); selAvatar=a; document.getElementById('confirmBtn').classList.add('ok'); };
    grid.appendChild(d);
  });
  curLine = 0; phase = 'dialog'; selAvatar = null;
  document.getElementById('dialogBox').style.display = '';
  document.getElementById('dialogBox').classList.remove('visible');
  document.getElementById('avatarSelect').classList.remove('visible');
  document.getElementById('confirmBtn').classList.remove('ok');
  document.getElementById('dialogHint').style.display = 'none';
  document.getElementById('dialogText').innerHTML = '<span class="cursor"></span>';

  setTimeout(() => {
    document.getElementById('dialogBox').classList.add('visible');
    setTimeout(() => {
      typeText(lines[0], document.getElementById('dialogText'), () => {
        document.getElementById('dialogHint').style.display = 'block';
      });
    }, 400);
  }, 300);
}

function confirmAvatar() {
  if (!selAvatar) return;
  const o = document.getElementById('transOverlay');
  document.getElementById('transAvatar').src = `frontend/public/pixel-icons/avatars/avatar_${selAvatar}.png`;
  o.classList.add('active'); o.style.display = 'flex';
  setTimeout(() => { o.classList.remove('active'); o.style.display = 'none'; showPage('login'); alert('🎉 实际会跳转到项目列表页！'); }, 2300);
}

document.addEventListener('click', e => {
  if (document.getElementById('page-welcome').style.display !== 'flex') return;
  if (phase !== 'dialog') return;
  if (e.target.closest('.demo-nav')) return;
  advanceDialog();
});

function showPage(name) {
  document.getElementById('page-login').style.display = name === 'login' ? 'flex' : 'none';
  document.getElementById('page-welcome').style.display = name === 'welcome' ? 'flex' : 'none';
  document.querySelectorAll('.dbtn').forEach(b => b.classList.remove('active'));
  if (event?.target?.classList) event.target.classList.add('active');
  if (name === 'welcome') initWelcome();
}

function playFull() {
  showPage('login');
  setTimeout(() => showPage('welcome'), 1500);
}
</script>
</body>
</html>
